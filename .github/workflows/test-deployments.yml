name: Test Deployments
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# cancel older, redundant runs of same workflow on same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  docker-deployments:
    name: Test the Docker Deployments
    runs-on: ubuntu-latest
    env:
      ZITI_CLI_IMAGE: ziti-cli
      ZITI_CONTROLLER_IMAGE: ziti-controller
      ZITI_ROUTER_IMAGE: ziti-router
      IMAGE_TAG: local  # override default :latest since we're not pulling from registry
      ARTIFACTS_DIR: ${{ github.workspace }}/build  # output dir for `go build`, input dir for `compose up --build`
      ZIGGY_UID: 1001  # let container EUID run-as GHA "runner" user to share cache, etc.
    steps:
      - name: Shallow checkout
        uses: actions/checkout@v4

      - name: Install Go
        id: setup-go
        uses: actions/setup-go@v5
        with:
          go-version-file: ./go.mod

      - name: Build ziti executable
        shell: bash
        run: |
          mkdir -pv ${ARTIFACTS_DIR}
          go build -o ${ARTIFACTS_DIR} ${GITHUB_WORKSPACE}/...

      # - name: Set Up QEMU
      #   uses: docker/setup-qemu-action@v3
      #   with:
      #     platforms: amd64

      # - name: Set Up Docker BuildKit
      #   id: buildx
      #   uses: docker/setup-buildx-action@v3

      - name: Build & Load CLI Container Image
        uses: docker/build-push-action@v6
        with:
          # builder: ${{ steps.buildx.outputs.name }}
          context: ${{ github.workspace }}/
          file: ${{ github.workspace }}/dist/docker-images/ziti-cli/Dockerfile
          # platforms: linux/amd64
          tags: ${{ env.ZITI_CLI_IMAGE }}:${{ env.IMAGE_TAG }}
          build-args: |
            ARTIFACTS_DIR=${{ env.ARTIFACTS_DIR }}
            DOCKER_BUILD_DIR=./dist/docker-images/ziti-cli
          load: true

      - name: Build & Load Controller Container Image
        uses: docker/build-push-action@v6
        with:
          # builder: ${{ steps.buildx.outputs.name }}
          context: ${{ github.workspace }}/
          file: ${{ github.workspace }}/dist/docker-images/ziti-controller/Dockerfile
          # platforms: linux/amd64
          tags: ziti-controller:${{ env.IMAGE_TAG }}
          build-args: |
            ZITI_CLI_TAG=${{ env.IMAGE_TAG }}
            ZITI_CLI_IMAGE=${{ env.ZITI_CLI_IMAGE }}
            DOCKER_BUILD_DIR=./dist/docker-images/ziti-controller
          load: true

      - name: Build & Push Multi-Platform Router Container Image to Hub
        uses: docker/build-push-action@v6
        with:
          # builder: ${{ steps.buildx.outputs.name }}
          context: ${{ github.workspace }}/
          file: ${{ github.workspace }}/dist/docker-images/ziti-router/Dockerfile
          # platforms: linux/amd64
          tags: ziti-router:${{ env.IMAGE_TAG }}
          build-args: |
            ZITI_CLI_TAG=${{ env.IMAGE_TAG }}
            ZITI_CLI_IMAGE=${{ env.ZITI_CLI_IMAGE }}
            DOCKER_BUILD_DIR=./dist/docker-images/ziti-router
          load: true

      - name: Run the all-in-one quickstart with locally-built ziti executable
        shell: bash
        working-directory: ./quickstart/docker/all-in-one
        run: docker compose up --build --detach

      - name: Wait for all-in-one quickstart controller then run quickstart tests
        shell: bash
        working-directory: ./quickstart/docker/all-in-one
        env:
          ZITI_GO_VERSION: ${{ steps.setup-go.outputs.go-version }}
        run: |
          sleep 9  # wait a moment for the :local image to build
          docker compose --profile test run --rm quickstart-test

      - name: Print debug info
        if: always()
        shell: bash
        working-directory: ./quickstart/docker/all-in-one
        run: |
          set +e
          set -x
          id runner
          ls -lAn ${GOCACHE:-${HOME}/.cache/go-build}/ ${GOPATH:-${HOME}/go}/pkg/mod/
          docker compose --profile test logs
